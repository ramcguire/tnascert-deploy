#
# Shared base config for packages that don't have their own ini fixture.
# FullChainPath and PrivateKeyPath are overridden by testhelpers.LoadConfig.
[deploy_default]
api_key = test
cert_basename = tnas-cert-deploy
private_key_path = placeholder
full_chain_path = placeholder
connect_host = nas01.mydomain.com
client_api = wsapi
protocol = wss
tls_skip_verify = false
delete_old_certs = true
timeout_seconds = 10
debug = false
